services:
  - type: web
    name: finalnexhr-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: https://asma123001.github.io
